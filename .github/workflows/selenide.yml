name: checkly-ci
run-name: "Checkly Automation: ${{ github.event.inputs.test-suite }} "

on:
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Select Suite (Choose "custom" to use the text box below)'
        required: true
        default: 'ui'
        type: choice
        options:
        - ui
        - api
        extra_args:
        description: 'Additional Maven args (e.g. -Dtest=LoginTest)'
        required: false
        default: ''
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    environment: playwright-test

    steps:
      - uses: actions/checkout@v4 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate Inputs
        run: |
          SUITE="${{ github.event.inputs.test-suite }}"
          ARGS="${{ github.event.inputs.extra_args }}"
          
          # Logic: If UI is selected, block any string containing "api" 
          if [[ "$SUITE" == "ui" && "$ARGS" == *"api"* ]]; then
            echo "::error::Illegal Argument: You cannot pass API arguments while running the UI suite."
            exit 1
          fi

          # Logic: If API is selected, block any string containing "ui" or "selenide"
          if [[ "$SUITE" == "api" && ( "$ARGS" == *"ui"* || "$ARGS" == *"selenide"* ) ]]; then
            echo "::error::Illegal Argument: You cannot pass UI/Selenide arguments while running the API suite."
            exit 1
          fi

      - name: Run Tests
        env:
            AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
            ACC_ID: ${{ secrets.ACC_ID }}
            USER_GOKUL: ${{ secrets.USER_GOKUL }}
            GOKUL_PASSWORD: ${{ secrets.GOKUL_PASSWORD }}
        run: |
          |
          if [ "${{ github.event.inputs.test-suite }}" == "ui" ]; then
            mvn clean test -DsuiteXmlFiles=checkly-ui.xml -Dselenide.headless=true ${{ github.event.inputs.extra_args }}
          else
            mvn clean test -DsuiteXmlFiles=checkly-api.xml ${{ github.event.inputs.extra_args }}
          fi

      - name: Generate Allure Report
        if: always()
        run: |
          ## This converts the raw JSON in allure-results into a viewable HTML report
          # mvn allure:report
          # Use the full groupId and artifactId to avoid the "prefix" error
          mvn io.qameta.allure:allure-maven:2.17.0:report


      - name: Upload Allure Results (Raw Data)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          keep_files: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # IMPORTANT: allure:report generates the HTML in target/site/allure-maven-plugin
          publish_dir: ./target/site/allure-maven-plugin
          destination_dir: ${{ github.event.inputs.test-suite }}