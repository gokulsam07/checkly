name: checkly-ci
run-name: "Checkly: ${{ github.event.inputs.test-suite }} ${{ github.event.inputs.extra_args }}"

on:
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Select Suite'
        required: true
        default: 'ui'
        type: choice
        options:
          - ui
          - api
      extra_args:
        description: 'Additional Maven args'
        required: false
        default: ''
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    environment: playwright-test

    steps:
      - uses: actions/checkout@v4 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate Inputs
        run: |
          SUITE="${{ github.event.inputs.test-suite }}"
          ARGS="${{ github.event.inputs.extra_args }}"
          
          # Convert to lowercase to catch "API", "Api", "api", etc.
          ARGS_LOWER=$(echo "$ARGS" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$SUITE" == "ui" && "$ARGS_LOWER" == *"api"* ]]; then
            echo "::error::Illegal Argument: You cannot pass API arguments while running the UI suite."
            exit 1
          fi

          if [[ "$SUITE" == "api" && ( "$ARGS_LOWER" == *"ui"* || "$ARGS_LOWER" == *"selenide"* ) ]]; then
            echo "::error::Illegal Argument: You cannot pass UI/Selenide arguments while running the API suite."
            exit 1
          fi

      - name: Run Tests
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          ACC_ID: ${{ secrets.ACC_ID }}
          USER_GOKUL: ${{ secrets.USER_GOKUL }}
          GOKUL_PASSWORD: ${{ secrets.GOKUL_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.test-suite }}" == "ui" ]; then
            mvn test -DsuiteXmlFiles=checkly-ui.xml -Dselenide.headless=true ${{ github.event.inputs.extra_args }}
          else
            mvn test -DsuiteXmlFiles=checkly-api.xml ${{ github.event.inputs.extra_args }}
          fi

      - name: Generate Allure Report
        if: always()
        run: mvn io.qameta.allure:allure-maven:2.17.0:report

      - name: Upload Allure Results (Raw Data)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.event.inputs.test-suite }}
          path: target/allure-results

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          keep_files: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          destination_dir: ${{ github.event.inputs.test-suite }}
      - name: Post Report Link
        if: always()
        run: |
          echo "### Test Results 🚀" >> $GITHUB_STEP_SUMMARY
          echo "Suite: ${{ github.event.inputs.test-suite }}" >> $GITHUB_STEP_SUMMARY
          echo "Report URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.event.inputs.test-suite }}/" >> $GITHUB_STEP_SUMMARY