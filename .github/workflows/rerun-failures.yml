name: checkly-rerun-failed
run-name: "Rerun [${{ github.event.inputs.test-suite }}]: ${{ github.event.inputs.extra_args }}"

on:
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Target Suite'
        required: true
        default: 'ui'
        type: choice
        options:
          - ui
          - api
      extra_args:
        description: 'Failed test (e.g., -Dtest=LoginTest#testMethod)'
        required: true
        default: ''
        type: string

jobs:
  rerun-test:
    runs-on: ubuntu-latest
    environment: selenide-test
    env:
            AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
            ACC_ID: ${{ secrets.ACC_ID }}
            USER_GOKUL: ${{ secrets.USER_GOKUL }}
            GOKUL_PASSWORD: ${{ secrets.GOKUL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate Manual Input
        run: |
          SUITE="${{ github.event.inputs.test-suite }}"
          ARGS_LOWER=$(echo "${{ github.event.inputs.extra_args }}" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$SUITE" == "ui" && "$ARGS_LOWER" == *"api"* ]]; then
            echo "::error::Validation Failed: Cannot run API tests in UI suite."
            exit 1
          fi
          if [[ "$SUITE" == "api" && ( "$ARGS_LOWER" == *"ui"* || "$ARGS_LOWER" == *"selenide"* ) ]]; then
            echo "::error::Validation Failed: Cannot run UI tests in API suite."
            exit 1
          fi

      - name: Download Previous Results
        uses: dawidd6/action-download-artifact@v6
        with:
          name: allure-results-${{ github.event.inputs.test-suite }}
          path: target/allure-results
          search_artifacts: true 
          workflow_conclusion: ""
          if_no_artifact_found: warn

      - name: Execute Rerun
        run: |
          # DO NOT USE 'mvn clean' here. It will delete the downloaded results.
          if [ "${{ github.event.inputs.test-suite }}" == "ui" ]; then
            mvn test -Dselenide.baseUrl=https://app.checklyhq.com -Dselenide.headless=true ${{ github.event.inputs.extra_args }}
          else
            mvn test -Dselenide.baseUrl=https://api.checklyhq.com/v1/ ${{ github.event.inputs.extra_args }}
          fi
        continue-on-error: true

      - name: Generate Merged Report
        if: always()
        run: mvn io.qameta.allure:allure-maven:2.17.0:report

      - name: Sync Results Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.event.inputs.test-suite }}
          path: target/allure-results
          overwrite: false

      - name: Update GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site/allure-maven-plugin
          destination_dir: ${{ github.event.inputs.test-suite }}
          keep_files: true